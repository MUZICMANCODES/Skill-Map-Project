kind = "web"
previewPath = "/"
title = "SkillMap"
version = "1.0.0"
id = "artifacts/skillmap"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22480

[services.development]
run = "pnpm --filter @workspace/skillmap run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/skillmap", "run", "build" ]
publicDir = "artifacts/skillmap/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22480"
BASE_PATH = "/"
